<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mauro Pires Advogados — Acesso</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1f3d;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}

/* FUNDO */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(184,137,42,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(26,47,82,.8) 0%,transparent 60%);pointer-events:none;}

/* LOGO */
.logo{text-align:center;margin-bottom:32px;}
.logo-mark{width:64px;height:64px;background:#b8892a;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:36px;font-weight:700;color:#0f1f3d;margin:0 auto 14px;}
.logo-nome{font-family:Georgia,serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:.5px;}
.logo-sub{font-size:11px;color:#b8892a;letter-spacing:2px;text-transform:uppercase;margin-top:4px;}

/* CARD */
.card{background:#fff;border-radius:18px;width:100%;max-width:400px;padding:36px;box-shadow:0 24px 80px rgba(0,0,0,.4);}
.card h2{font-size:18px;font-weight:700;color:#0f1f3d;margin-bottom:6px;}
.card p{font-size:13px;color:#6b6355;margin-bottom:24px;}

/* CAMPOS */
.fld{margin-bottom:16px;}
.fld label{display:block;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#6b6355;margin-bottom:6px;}
.fld input{width:100%;padding:11px 14px;border:1.5px solid #e0d8cc;border-radius:9px;font-size:14px;font-family:inherit;color:#1c1c1c;background:#faf8f4;transition:border-color .18s,box-shadow .18s;outline:none;}
.fld input:focus{border-color:#b8892a;box-shadow:0 0 0 3px rgba(184,137,42,.15);background:#fff;}
.fld .pw-wrap{position:relative;}
.fld .pw-wrap input{padding-right:42px;}
.fld .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#6b6355;padding:2px;}

/* BOTÃO */
.btn-login{width:100%;padding:13px;background:#b8892a;border:none;border-radius:10px;font-size:14px;font-weight:700;color:#0f1f3d;cursor:pointer;transition:background .18s,transform .1s;margin-top:4px;letter-spacing:.3px;}
.btn-login:hover{background:#d4a843;}
.btn-login:active{transform:scale(.98);}
.btn-login:disabled{opacity:.6;cursor:not-allowed;}

/* ERRO */
.erro{background:#fdf0f0;border:1px solid #f5c6c6;border-radius:8px;padding:10px 14px;font-size:12px;color:#9b2020;margin-bottom:14px;display:none;}
.erro.show{display:block;}

/* SESSÃO ATIVA */
.sessao-card{background:#fff;border-radius:18px;width:100%;max-width:420px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.4);text-align:center;display:none;}
.sessao-card.show{display:block;}
.perfil-badge{display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:12px;}
.sessao-nome{font-family:Georgia,serif;font-size:20px;font-weight:700;color:#0f1f3d;margin-bottom:4px;}
.sessao-perfil{font-size:13px;color:#6b6355;margin-bottom:20px;}
.modulos{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
.mod-btn{padding:13px 18px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:10px;}
.mod-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.15);}
.mod-btn .icon{font-size:20px;}
.btn-sair{background:none;border:1.5px solid #e0d8cc;color:#6b6355;border-radius:8px;padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;width:100%;}
.btn-sair:hover{border-color:#9b2020;color:#9b2020;}

/* RODAPÉ */
.rodape{margin-top:24px;font-size:11px;color:rgba(255,255,255,.3);text-align:center;}

/* LOADING */
.loading{display:none;text-align:center;color:rgba(255,255,255,.6);font-size:13px;margin-top:16px;}

@media(max-width:480px){.card,.sessao-card{padding:24px;border-radius:14px;}}
</style>
</head>
<body>

<div class="logo">
  <div class="logo-mark">M</div>
  <div class="logo-nome">Mauro Pires Advogados</div>
  <div class="logo-sub">Sistema de Gestão</div>
</div>

<!-- FORMULÁRIO DE LOGIN -->
<div class="card" id="card-login">
  <h2>Acesso ao Sistema</h2>
  <p>Entre com seu usuário e senha para continuar.</p>
  <div class="erro" id="msg-erro"></div>
  <div class="fld">
    <label>Usuário</label>
    <input type="text" id="inp-user" placeholder="seu.usuario" autocomplete="username" onkeydown="if(event.key==='Enter')$('inp-pass').focus()">
  </div>
  <div class="fld">
    <label>Senha</label>
    <div class="pw-wrap">
      <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')fazerLogin()">
      <button class="pw-toggle" onclick="togglePW()" tabindex="-1">👁</button>
    </div>
  </div>
  <button class="btn-login" id="btn-entrar" onclick="fazerLogin()">Entrar</button>
</div>

<!-- SESSÃO ATIVA — MENU DE MÓDULOS -->
<div class="sessao-card" id="card-sessao">
  <div class="perfil-badge" id="sessao-badge"></div>
  <div class="sessao-nome" id="sessao-nome"></div>
  <div class="sessao-perfil" id="sessao-perfil"></div>
  <div class="modulos" id="sessao-modulos"></div>
  <button class="btn-sair" onclick="sair()">↩ Sair do sistema</button>
</div>

<div class="rodape">Mauro Pires Advogados · Acesso restrito · Uso interno</div>

<script>
// ═══ CONFIGURAÇÃO ══════════════════════════════════════════════
const URLS = {
  financeiro: 'Financeiro.html',
  processual:  'MauroPires_Gestao_Processual.html',
  admin:       'MauroPires_Admin.html',
};

const PERFIS = {
  admin:      { label:'Administrador',    cor:'#b8892a', bg:'#f9f0dc',
                modulos:[
                  {id:'financeiro', label:'Gestão Financeira', icon:'💰', cor:'#1e5c3a', bg:'#e8f4ee'},
                  {id:'processual', label:'Gestão Processual', icon:'⚖️', cor:'#1a3a6b', bg:'#e8eef8'},
                  {id:'admin',      label:'Administração',     icon:'⚙️', cor:'#b8892a', bg:'#f9f0dc'},
                ]},
  socio:      { label:'Sócio',           cor:'#1e5c3a', bg:'#e8f4ee',
                modulos:[
                  {id:'financeiro', label:'Gestão Financeira', icon:'💰', cor:'#1e5c3a', bg:'#e8f4ee'},
                  {id:'processual', label:'Gestão Processual', icon:'⚖️', cor:'#1a3a6b', bg:'#e8eef8'},
                ]},
  coordenador:{ label:'Coordenador',     cor:'#0d6e6e', bg:'#e0f4f4',
                modulos:[
                  {id:'processual', label:'Gestão Processual', icon:'⚖️', cor:'#0d6e6e', bg:'#e0f4f4'},
                ]},
  pj:         { label:'Adv. Contratado', cor:'#4a1d7a', bg:'#f0eafb',
                modulos:[
                  {id:'processual', label:'Meus Processos',    icon:'⚖️', cor:'#4a1d7a', bg:'#f0eafb'},
                ]},
  financeiro: { label:'Gestor Financeiro',cor:'#1a3a6b', bg:'#e8eef8',
                modulos:[
                  {id:'financeiro', label:'Gestão Financeira', icon:'💰', cor:'#1a3a6b', bg:'#e8eef8'},
                ]},
};

// ═══ USUÁRIOS (localStorage) ════════════════════════════════════
const USUARIOS_DEFAULT = [
  {id:'admin',      nome:'Administrador',    perfil:'admin',       senha:'Admin@2026',   ativo:true},
  {id:'marcelo',    nome:'Marcelo',          perfil:'socio',       senha:'Marcelo@2026', ativo:true},
  {id:'murilo',     nome:'Murilo',           perfil:'socio',       senha:'Murilo@2026',  ativo:true},
  {id:'renato',     nome:'Renato',           perfil:'socio',       senha:'Renato@2026',  ativo:true},
  {id:'luizf',      nome:'Luiz Fernando',    perfil:'socio',       senha:'LuizF@2026',   ativo:true},
  {id:'paulor',     nome:'Paulo Renato',     perfil:'socio',       senha:'PauloR@2026',  ativo:true},
  {id:'coordenador',nome:'Coordenador',      perfil:'coordenador', senha:'Coord@2026',   ativo:true},
  {id:'pj1',        nome:'Adv. PJ 1',        perfil:'pj',          senha:'PJ1@2026',     ativo:true},
  {id:'pj2',        nome:'Adv. PJ 2',        perfil:'pj',          senha:'PJ2@2026',     ativo:true},
  {id:'pj3',        nome:'Adv. PJ 3',        perfil:'pj',          senha:'PJ3@2026',     ativo:true},
  {id:'gestor',     nome:'Gestor Financeiro',perfil:'financeiro',  senha:'Gestor@2026',  ativo:true},
];

function getUsuarios(){
  const salvo = localStorage.getItem('mp_usuarios');
  if(salvo) return JSON.parse(salvo);
  // Primeiro acesso: inicializar com padrão
  localStorage.setItem('mp_usuarios', JSON.stringify(USUARIOS_DEFAULT));
  return USUARIOS_DEFAULT;
}

function getSessao(){
  // Tentar sessionStorage primeiro, depois localStorage
  let s = sessionStorage.getItem('mp_sessao') || localStorage.getItem('mp_sessao');
  if(!s) return null;
  const sess = JSON.parse(s);
  // Verificar expiração
  if(sess.expira && new Date(sess.expira) < new Date()){
    sessionStorage.removeItem('mp_sessao');
  localStorage.removeItem('mp_sessao');
    localStorage.removeItem('mp_sessao');
    return null;
  }
  return sess;
}

// ═══ HASH SHA-256 ════════════════════════════════════════════════
async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ═══ LOGIN ═══════════════════════════════════════════════════════
async function fazerLogin(){
  const userId = $('inp-user').value.trim().toLowerCase();
  const senha  = $('inp-pass').value;
  if(!userId||!senha){ mostrarErro('Preencha usuário e senha.'); return; }

  const btn=$('btn-entrar');
  btn.disabled=true; btn.textContent='Verificando...';

  const usuarios = getUsuarios();
  const user = usuarios.find(u=>u.id===userId);

  if(!user||!user.ativo){ await delay(800); mostrarErro('Usuário ou senha incorretos.'); btn.disabled=false;btn.textContent='Entrar'; return; }

  // Verificar senha — suporta texto puro (padrão) e hash
  let ok = false;
  if(user.senha === senha){ ok=true; }
  else if(user.senhaHash){
    const hash = await sha256(senha);
    ok = hash === user.senhaHash;
  }

  if(!ok){ await delay(800); mostrarErro('Usuário ou senha incorretos.'); btn.disabled=false;btn.textContent='Entrar'; return; }

  // Sessão válida — usar localStorage com expiração de 8h
  const sessao = { 
    id:user.id, nome:user.nome, perfil:user.perfil, 
    dt:new Date().toISOString(),
    expira: new Date(Date.now() + 8*60*60*1000).toISOString()
  };
  localStorage.setItem('mp_sessao', JSON.stringify(sessao));
  sessionStorage.setItem('mp_sessao', JSON.stringify(sessao));

  // Registrar log de acesso
  const logs = JSON.parse(localStorage.getItem('mp_logs')||'[]');
  logs.push({dt:new Date().toISOString(),user:user.id,nome:user.nome,perfil:user.perfil,acao:'login'});
  if(logs.length>200) logs.splice(0,logs.length-200);
  localStorage.setItem('mp_logs', JSON.stringify(logs));

  btn.disabled=false; btn.textContent='Entrar';
  mostrarSessao(sessao);
}

function mostrarSessao(sessao){
  $('card-login').style.display='none';
  $('card-sessao').classList.add('show');
  const perf = PERFIS[sessao.perfil]||PERFIS.socio;
  $('sessao-badge').textContent = perf.label;
  $('sessao-badge').style.cssText=`background:${perf.bg};color:${perf.cor};display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;`;
  $('sessao-nome').textContent = sessao.nome;
  $('sessao-perfil').textContent = `Perfil: ${perf.label}`;
  $('sessao-modulos').innerHTML = perf.modulos.map(m=>`
    <button class="mod-btn" onclick="abrirModulo('${m.id}','${sessao.perfil}','${sessao.id}')" style="background:${m.bg};color:${m.cor}">
      <span class="icon">${m.icon}</span>
      <span>${m.label}</span>
    </button>`).join('');
}

function abrirModulo(modulo, perfil, userId){
  // Passar sessão para o módulo via URL + sessionStorage (já salvo)
  const url = URLS[modulo];
  if(!url){ alert('Módulo não disponível.'); return; }
  // Adicionar parâmetros na URL para o módulo saber quem está logado
  // Redirecionar na mesma aba
  window.location.href = `${url}?perfil=${perfil}&user=${userId}`;
}

function sair(){
  sessionStorage.removeItem('mp_sessao');
  localStorage.removeItem('mp_sessao');
  $('card-sessao').classList.remove('show');
  $('card-login').style.display='block';
  $('inp-user').value='';$('inp-pass').value='';
  esconderErro();
}

// ═══ UTILS ════════════════════════════════════════════════════════
const $=id=>document.getElementById(id);
function mostrarErro(msg){const el=$('msg-erro');el.textContent=msg;el.classList.add('show');}
function esconderErro(){$('msg-erro').classList.remove('show');}
function togglePW(){const i=$('inp-pass');i.type=i.type==='password'?'text':'password';}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}

// ═══ INIT ══════════════════════════════════════════════════════════
window.onload=function(){
  // Se já tem sessão ativa (mesma aba), mostrar menu
  const sessao=getSessao();
  if(sessao) mostrarSessao(sessao);
  else $('inp-user').focus();
};
</script>
</body>
</html>
